{% extends "base.html" %}
{% load static %}
{% block title %}تسجيل الدخول{% endblock %}

{% block content %}
<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <!-- ✅ الشعار -->
      <div class="login-logo">
        <img src="{% static 'img/logo.png' %}" alt="شعار النظام" width="120">
      </div>

      <h1 class="login-title">تسجيل الدخول</h1>
      <p class="login-subtitle">مرحباً بك، يرجى إدخال بيانات الدخول الخاصة بك</p>
    </div>

    <form method="POST" class="login-form">
      {% csrf_token %}
      
      <div class="form-group">
        <label class="form-label">
          <i class="fas fa-id-card"></i>
          رقم الهوية
        </label>
        <input class="form-input" 
               type="text" 
               name="national_id" 
               inputmode="numeric" 
               autocomplete="username" 
               placeholder="أدخل رقم الهوية" 
               required>
        <div class="input-hint">رقم الهوية مكون من 10 أرقام</div>
      </div>

      <div class="form-group">
        <label class="form-label">
          <i class="fas fa-key"></i>
          كلمة المرور
        </label>
        <input class="form-input" 
               type="password" 
               name="password" 
               autocomplete="current-password" 
               placeholder="أدخل كلمة المرور" 
               required>
        <div class="input-hint">أدخل كلمة المرور الخاصة بحسابك</div>
      </div>

      <button class="btn btn-primary btn-login">
        <i class="fas fa-sign-in-alt"></i>
        دخول إلى النظام
      </button>
    </form>
  </div>

  <div class="login-background">
    <div class="background-shape shape-1"></div>
    <div class="background-shape shape-2"></div>
    <div class="background-shape shape-3"></div>
  </div>
</div>

<style>
  body {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  }

  .login-container {
    position: relative;
    width: 100%;
    max-width: 440px;
    margin: 0 auto;
  }

  .login-card {
    background: #ffffff;
    border-radius: 20px;
    box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
    padding: 35px 30px;
    position: relative;
    z-index: 2;
    backdrop-filter: blur(10px);
    overflow: hidden;
  }

  .login-card::before {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.1), transparent);
    transform: rotate(45deg);
    z-index: -1;
  }

  /* رأس البطاقة */
  .login-header {
    text-align: center;
    margin-bottom: 30px;
  }

  .login-logo img {
    display: block;
    margin: 0 auto 20px;
    max-width: 150px;
    height: auto;
  }

  .login-title {
    font-size: 28px;
    font-weight: 700;
    color: #2d3748;
    margin: 0 0 10px;
  }

  .login-subtitle {
    color: #718096;
    font-size: 15px;
    margin: 0;
  }

  .login-form {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .form-group {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .form-label {
    font-weight: 600;
    color: #4a5568;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
  }

  .form-input {
    padding: 15px 15px;
    border: 2px solid #e2e8f0;
    border-radius: 12px;
    font-size: 16px;
    transition: all 0.3s ease;
    background-color: #f8fafc;
  }

  .form-input:focus {
    outline: none;
    border-color: #667eea;
    box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2);
    background-color: #ffffff;
  }

  .input-hint {
    font-size: 12px;
    color: #a0aec0;
    margin-top: 4px;
  }

  .btn-login {
    padding: 15px;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 600;
    margin-top: 10px;
    border: none;
    cursor: pointer;
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
  }

  .btn-login:hover {
    transform: translateY(-2px);
    box-shadow: 0 7px 14px rgba(102, 126, 234, 0.4);
  }

  .btn-login:active {
    transform: translateY(0);
  }

  .login-footer {
    text-align: center;
    margin-top: 20px;
    padding-top: 20px;
    border-top: 1px solid #e2e8f0;
  }

  .login-footer p {
    margin: 0;
    color: #718096;
    font-size: 14px;
  }

  .forgot-link {
    color: #667eea;
    text-decoration: none;
    font-weight: 600;
    transition: color 0.3s;
  }

  .forgot-link:hover {
    color: #764ba2;
    text-decoration: underline;
  }

  .login-background {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    z-index: 1;
    overflow: hidden;
  }

  .background-shape {
    position: absolute;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.1);
  }

  .shape-1 {
    width: 300px;
    height: 300px;
    top: -150px;
    right: -150px;
    animation: float 15s infinite ease-in-out;
  }

  .shape-2 {
    width: 200px;
    height: 200px;
    bottom: -100px;
    left: -100px;
    animation: float 12s infinite ease-in-out reverse;
  }

  .shape-3 {
    width: 150px;
    height: 150px;
    bottom: 50px;
    right: 50px;
    animation: float 10s infinite ease-in-out;
  }

  @keyframes float {
    0%, 100% {
      transform: translateY(0) rotate(0deg);
    }
    50% {
      transform: translateY(-20px) rotate(10deg);
    }
  }

  @media (max-width: 480px) {
    .login-card {
      padding: 25px 20px;
    }
    
    .login-title {
      font-size: 24px;
    }
    
    .login-logo img {
      max-width: 120px;
    }
    
    .form-input {
      padding: 12px;
    }
    
    .btn-login {
      padding: 12px;
    }
  }

  .alert {
    padding: 12px 16px;
    border-radius: 10px;
    margin-bottom: 20px;
    font-weight: 500;
  }
  
  .alert-error {
    background-color: #fed7d7;
    color: #c53030;
    border: 1px solid #feb2b2;
  }
  
  .alert-success {
    background-color: #c6f6d5;
    color: #2d7848;
    border: 1px solid #9ae6b4;
  }
</style>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<script>
  document.addEventListener('DOMContentLoaded', function() {
    const form = document.querySelector('.login-form');
    const inputs = document.querySelectorAll('.form-input');
    
    inputs.forEach(input => {
      input.addEventListener('focus', function() {
        this.parentElement.classList.add('focused');
      });
      
      input.addEventListener('blur', function() {
        if (this.value === '') {
          this.parentElement.classList.remove('focused');
        }
      });
    });
    
    form.addEventListener('submit', function(e) {
      const btn = this.querySelector('.btn-login');
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري الدخول...';
      btn.disabled = true;
    });
  });
</script>
{% endblock %}
